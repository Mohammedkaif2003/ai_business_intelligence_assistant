name: pipeline-ci

on:
  push:
    paths:
      - 'rigorous_pipeline/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'rigorous_pipeline/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: rigorous_pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run guardrail and unit tests
        run: pytest tests/ -v --tb=short
      - name: Verify notebook is valid JSON
        run: python -c "import json, pathlib; json.loads(pathlib.Path('notebooks/readmission_analysis.ipynb').read_text())"
